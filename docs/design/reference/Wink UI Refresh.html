<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Wink · UI Refresh</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
  body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="logos.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="primitives.jsx"></script>
<script type="text/babel" src="chrome.jsx"></script>
<script type="text/babel" src="menubar.jsx"></script>
<script type="text/babel" src="tab-shortcuts.jsx"></script>
<script type="text/babel" src="tab-general.jsx"></script>
<script type="text/babel" src="tab-insights.jsx"></script>
<script type="text/babel" src="mainwindow.jsx"></script>
<script type="text/babel" src="design-canvas.jsx"></script>

<script type="text/babel">

// Tweaks state
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accent": "blue",
  "showBothThemes": true,
  "permissionGranted": false
}/*EDITMODE-END*/;

function applyAccent(accent) {
  // mutate theme objects based on accent choice
  const L = window.lightTheme, D = window.darkTheme;
  const presets = {
    blue:   { l: '#0064E0', d: '#2A8FFF' },
    green:  { l: '#2E8B45', d: '#40C060' },
    violet: { l: '#6B48C9', d: '#A689F0' },
    warm:   { l: '#C46A2E', d: '#F09455' },
  };
  const p = presets[accent] || presets.blue;
  L.accent = p.l; L.accentHover = p.l;
  L.accentBgSoft = `${p.l}14`;
  L.accentBorderSoft = `${p.l}2E`;
  L.heatmapBase = `${p.l}1A`;
  D.accent = p.d;
  D.accentHover = p.d;
  D.accentBgSoft = `${p.d}28`;
  D.accentBorderSoft = `${p.d}48`;
  D.heatmapBase = `${p.d}33`;
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAK_DEFAULTS);
  const [editing, setEditing] = React.useState(false);

  applyAccent(tweaks.accent);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data;
      if (!d || typeof d !== 'object') return;
      if (d.type === '__activate_edit_mode') setEditing(true);
      if (d.type === '__deactivate_edit_mode') setEditing(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const set = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  const L = 'light', D = 'dark';

  return (
    <>
      <window.DesignCanvas>
        <window.DCSection id="menubar" title="Menu bar popover" subtitle="Opens from the menu bar icon · now has search, today mini-chart, pause-all">
          <window.DCArtboard id="mb-light" label="Light" width={340} height={520} style={{ background: '#F2EFEA', padding: 20 }}>
            <window.MenubarPopover theme={L} />
          </window.DCArtboard>
          <window.DCArtboard id="mb-dark" label="Dark" width={340} height={520} style={{ background: '#1A1A1C', padding: 20 }}>
            <window.MenubarPopover theme={D} />
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="shortcuts" title="Main window · Shortcuts" subtitle="Sidebar nav · softer permission banner · inline-record composer · rich shortcut rows">
          <window.DCArtboard id="sc-light" label="Light · Permission granted" width={860} height={860} style={{ background: '#E8E6E1', padding: 20 }}>
            <window.MainWindow theme={L} tab="shortcuts" permissionGranted={true} height={820} />
          </window.DCArtboard>
          <window.DCArtboard id="sc-dark" label="Dark · Permission granted" width={860} height={860} style={{ background: '#141416', padding: 20 }}>
            <window.MainWindow theme={D} tab="shortcuts" permissionGranted={true} height={820} />
          </window.DCArtboard>
          <window.DCArtboard id="sc-light-warn" label="Light · Needs permission" width={860} height={860} style={{ background: '#E8E6E1', padding: 20 }}>
            <window.MainWindow theme={L} tab="shortcuts" permissionGranted={false} height={820} />
          </window.DCArtboard>
          <window.DCArtboard id="sc-dark-warn" label="Dark · Needs permission" width={860} height={860} style={{ background: '#141416', padding: 20 }}>
            <window.MainWindow theme={D} tab="shortcuts" permissionGranted={false} height={820} />
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="insights" title="Main window · Insights" subtitle="Expanded from a simple bar list: KPIs, hourly heatmap, per-app sparklines, nudge card">
          <window.DCArtboard id="in-light" label="Light" width={860} height={920} style={{ background: '#E8E6E1', padding: 20 }}>
            <window.MainWindow theme={L} tab="insights" permissionGranted={true} height={880} />
          </window.DCArtboard>
          <window.DCArtboard id="in-dark" label="Dark" width={860} height={920} style={{ background: '#141416', padding: 20 }}>
            <window.MainWindow theme={D} tab="insights" permissionGranted={true} height={880} />
          </window.DCArtboard>
        </window.DCSection>

        <window.DCSection id="general" title="Main window · General" subtitle="Grouped cards like System Settings · keyboard, hyper, permissions recap, updates">
          <window.DCArtboard id="ge-light" label="Light" width={860} height={760} style={{ background: '#E8E6E1', padding: 20 }}>
            <window.MainWindow theme={L} tab="general" permissionGranted={true} height={720} />
          </window.DCArtboard>
          <window.DCArtboard id="ge-dark" label="Dark" width={860} height={760} style={{ background: '#141416', padding: 20 }}>
            <window.MainWindow theme={D} tab="general" permissionGranted={true} height={720} />
          </window.DCArtboard>
        </window.DCSection>

      </window.DesignCanvas>

      {editing && (
        <div style={{
          position: 'fixed', bottom: 16, right: 16, zIndex: 1000,
          width: 240,
          background: '#2A2521', color: '#F2EFEA',
          borderRadius: 10,
          boxShadow: '0 10px 30px rgba(0,0,0,0.35)',
          fontSize: 12,
          padding: 12,
          fontFamily: 'inherit',
        }}>
          <div style={{ fontWeight: 600, fontSize: 13, marginBottom: 10 }}>Tweaks</div>

          <div style={{ marginBottom: 10 }}>
            <div style={{ opacity: .7, fontSize: 11, marginBottom: 6 }}>Accent color</div>
            <div style={{ display: 'flex', gap: 6 }}>
              {[
                { k: 'blue',   c: '#2A8FFF' },
                { k: 'green',  c: '#40C060' },
                { k: 'violet', c: '#A689F0' },
                { k: 'warm',   c: '#F09455' },
              ].map(o => (
                <div key={o.k} onClick={() => set('accent', o.k)} style={{
                  width: 28, height: 28, borderRadius: 6,
                  background: o.c, cursor: 'pointer',
                  border: tweaks.accent === o.k ? '2px solid #fff' : '2px solid transparent',
                  boxSizing: 'border-box',
                }} />
              ))}
            </div>
          </div>

          <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer' }}>
            <input type="checkbox" checked={tweaks.permissionGranted}
              onChange={(e) => set('permissionGranted', e.target.checked)} />
            Permission granted (Shortcuts tab)
          </label>

          <div style={{
            fontSize: 10.5, opacity: .55, marginTop: 10, lineHeight: 1.4,
          }}>Drag artboards to reorder · click a label to focus one</div>
        </div>
      )}
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>

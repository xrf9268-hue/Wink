name: Internal Package

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      package_ref:
        description: Branch, tag, or commit to package for internal testing
        required: false
        default: main
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'workflow_dispatch' && inputs.package_ref || github.ref }}
  cancel-in-progress: true

jobs:
  package:
    name: Build Internal DMG Artifact
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.package_ref || github.ref }}

      - name: Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Package app bundle
        run: bash scripts/package-app.sh

      - name: Package DMG
        run: bash scripts/package-dmg.sh

      - name: Resolve artifact metadata
        env:
          MANUAL_PACKAGE_REF: ${{ inputs.package_ref }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Sources/Quickey/Resources/Info.plist)"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            SOURCE_REF="${MANUAL_PACKAGE_REF}"
          else
            SOURCE_REF="${GITHUB_REF_NAME}"
          fi

          SAFE_REF="$(printf '%s' "$SOURCE_REF" | tr '/[:space:]' '--' | tr -cd 'A-Za-z0-9._-')"
          if [ -z "$SAFE_REF" ]; then
            SAFE_REF="ref"
          fi

          INTERNAL_RELEASE_URL="https://github.com/${GITHUB_REPOSITORY}/releases/tag/internal-downloads"
          INTERNAL_DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/internal-downloads/Quickey-${VERSION}.dmg"

          echo "DMG_PATH=build/Quickey-${VERSION}.dmg" >> "$GITHUB_ENV"
          echo "ARTIFACT_NAME=Quickey-${VERSION}-internal-${SAFE_REF}" >> "$GITHUB_ENV"
          echo "SOURCE_REF=$SOURCE_REF" >> "$GITHUB_ENV"
          echo "PACKAGE_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"
          echo "INTERNAL_RELEASE_URL=$INTERNAL_RELEASE_URL" >> "$GITHUB_ENV"
          echo "INTERNAL_DOWNLOAD_URL=$INTERNAL_DOWNLOAD_URL" >> "$GITHUB_ENV"

      - name: Verify internal DMG
        run: test -f "$DMG_PATH"

      - name: Upload internal DMG artifact
        id: upload
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.DMG_PATH }}
          if-no-files-found: error
          retention-days: 14
          compression-level: 0
          archive: false

      - name: Publish rolling internal prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          API_VERSION="2026-03-10"
          REF_ENDPOINT="repos/${GITHUB_REPOSITORY}/git/refs/tags/internal-downloads"
          RELEASE_BY_TAG_ENDPOINT="repos/${GITHUB_REPOSITORY}/releases/tags/internal-downloads"
          NOTES_FILE="$RUNNER_TEMP/internal-downloads-notes.md"
          DOWNLOAD_URL="https://github.com/${GITHUB_REPOSITORY}/releases/download/internal-downloads/$(basename "$DMG_PATH")"

          cat > "$NOTES_FILE" <<EOF
          Latest internal Quickey build for trusted testers.

          ## Who should use this

          Use this package when you need the newest Quickey build for team testing before a Developer ID signed release is available.
          If you are looking for a public-ready build, use the normal GitHub Releases page instead of this prerelease.

          ## What to expect

          - This DMG is built from \`$SOURCE_REF\` at commit \`$PACKAGE_SHA\`
          - It is intended for trusted internal testing only
          - It is not Developer ID signed
          - It is not notarized
          - macOS may warn the first time you open it

          ## Install notes

          1. Download \`$(basename "$DMG_PATH")\`
          2. Open the DMG and drag \`Quickey.app\` into \`Applications\`
          3. Launch Quickey from \`/Applications\`
          4. If macOS blocks the first launch, use the standard Finder "Open" flow on a trusted internal machine

          ## Build details

          - Source ref: \`$SOURCE_REF\`
          - Commit: \`$PACKAGE_SHA\`
          - Artifact: \`$ARTIFACT_NAME\`
          - DMG: \`$(basename "$DMG_PATH")\`
          - Direct download: $DOWNLOAD_URL

          This prerelease exists to provide a stable internal download URL. It is not a substitute for a signed and notarized release.
          EOF

          if gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: $API_VERSION" \
            "$REF_ENDPOINT" >/dev/null 2>&1; then
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: $API_VERSION" \
              "$REF_ENDPOINT" \
              -f sha="$PACKAGE_SHA" \
              -F force=true >/dev/null
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: $API_VERSION" \
              "repos/${GITHUB_REPOSITORY}/git/refs" \
              -f ref="refs/tags/internal-downloads" \
              -f sha="$PACKAGE_SHA" >/dev/null
          fi

          if gh api \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: $API_VERSION" \
            "$RELEASE_BY_TAG_ENDPOINT" >/dev/null 2>&1; then
            gh release edit internal-downloads \
              --verify-tag \
              --draft=false \
              --prerelease \
              --title "Internal Downloads" \
              --notes-file "$NOTES_FILE"
          else
            gh release create internal-downloads \
              --verify-tag \
              --prerelease \
              --latest=false \
              --title "Internal Downloads" \
              --notes-file "$NOTES_FILE"
          fi

          gh release upload internal-downloads \
            "$DMG_PATH#Quickey Internal DMG" \
            --clobber

          ACTUAL_RELEASE_URL="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: $API_VERSION" \
              "$RELEASE_BY_TAG_ENDPOINT" \
              --jq '.html_url'
          )"

          if [ "$ACTUAL_RELEASE_URL" != "$INTERNAL_RELEASE_URL" ]; then
            echo "expected release URL: $INTERNAL_RELEASE_URL" >&2
            echo "actual release URL:   $ACTUAL_RELEASE_URL" >&2
            exit 1
          fi

      - name: Summarize internal package
        run: |
          {
            echo "## Internal package ready"
            echo
            echo "Best download page: [Open internal-downloads]($INTERNAL_RELEASE_URL)"
            echo "Direct DMG: [Download $(basename "$DMG_PATH")]($INTERNAL_DOWNLOAD_URL)"
            echo
            echo "Artifact: \`$ARTIFACT_NAME\`"
            echo "DMG path: \`$DMG_PATH\`"
            echo "Download: [Open artifact](${{ steps.upload.outputs.artifact-url }})"
            echo "Internal prerelease: [Open internal-downloads]($INTERNAL_RELEASE_URL)"
            echo
            echo "This package is intended for trusted internal testing only. It is not Developer ID signed or notarized, so macOS may warn on first launch."
          } >> "$GITHUB_STEP_SUMMARY"

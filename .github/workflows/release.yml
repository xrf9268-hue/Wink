name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to publish manually (for example v0.2.0)
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-readiness:
    name: Check release prerequisites
    runs-on: ubuntu-latest
    outputs:
      release_ready: ${{ steps.check.outputs.release_ready }}
      missing_secrets: ${{ steps.check.outputs.missing_secrets }}
      release_ref: ${{ steps.resolve.outputs.release_ref }}
    steps:
      - name: Resolve requested release ref
        id: resolve
        env:
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_REF="${MANUAL_RELEASE_TAG}"
          else
            RELEASE_REF="${GITHUB_REF_NAME}"
          fi

          echo "release_ref=$RELEASE_REF" >> "$GITHUB_OUTPUT"

      - name: Check release secrets
        id: check
        env:
          DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT_BASE64 }}
          DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          DEVELOPER_ID_APP_SIGNING_IDENTITY: ${{ secrets.DEVELOPER_ID_APP_SIGNING_IDENTITY }}
          NOTARYTOOL_KEY: ${{ secrets.NOTARYTOOL_KEY }}
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER: ${{ secrets.NOTARYTOOL_ISSUER }}
        run: |
          missing=()

          for secret_name in \
            DEVELOPER_ID_APP_CERT_BASE64 \
            DEVELOPER_ID_APP_CERT_PASSWORD \
            KEYCHAIN_PASSWORD \
            DEVELOPER_ID_APP_SIGNING_IDENTITY \
            NOTARYTOOL_KEY \
            NOTARYTOOL_KEY_ID \
            NOTARYTOOL_ISSUER
          do
            if [ -z "${!secret_name:-}" ]; then
              missing+=("$secret_name")
            fi
          done

          if [ "${#missing[@]}" -eq 0 ]; then
            echo "release_ready=true" >> "$GITHUB_OUTPUT"
            echo "missing_secrets=" >> "$GITHUB_OUTPUT"
          else
            missing_csv="$(IFS=,; echo "${missing[*]}")"
            echo "release_ready=false" >> "$GITHUB_OUTPUT"
            echo "missing_secrets=$missing_csv" >> "$GITHUB_OUTPUT"
          fi

  release-unavailable:
    name: Skip release without signing credentials
    needs: release-readiness
    if: ${{ needs.release-readiness.outputs.release_ready != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize skipped release
        env:
          RELEASE_REF: ${{ needs.release-readiness.outputs.release_ref }}
          MISSING_SECRETS: ${{ needs.release-readiness.outputs.missing_secrets }}
        run: |
          echo "::notice title=Release skipped::Missing required release secrets: $MISSING_SECRETS"

          {
            echo "## Release skipped"
            echo
            echo "Wink's formal release pipeline requires Developer ID signing and Apple notarization credentials."
            echo "Those secrets are not configured in this repository, so no signed or notarized GitHub Release asset was published."
            echo
            echo "Missing secrets:"

            IFS=',' read -r -a missing <<< "$MISSING_SECRETS"
            for secret_name in "${missing[@]}"; do
              echo "- \`$secret_name\`"
            done

            echo
            echo "For an internal test build, run the \`Internal Package\` workflow with \`package_ref=$RELEASE_REF\`."
          } >> "$GITHUB_STEP_SUMMARY"

  release:
    name: Build, Notarize, and Publish DMG
    needs: release-readiness
    if: ${{ needs.release-readiness.outputs.release_ready == 'true' }}
    runs-on: macos-15
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set temporary paths
        run: |
          echo "KEYCHAIN_PATH=$RUNNER_TEMP/wink-release.keychain-db" >> "$GITHUB_ENV"
          echo "CERT_PATH=$RUNNER_TEMP/wink-developer-id.p12" >> "$GITHUB_ENV"
          echo "NOTARY_KEY_PATH=$RUNNER_TEMP/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Checkout manual release tag
        if: ${{ github.event_name == 'workflow_dispatch' }}
        env:
          RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "Error: workflow_dispatch release_tag must start with 'v', got '$RELEASE_TAG'" >&2
              exit 1
              ;;
          esac

          git fetch --force --tags origin
          git rev-parse "refs/tags/$RELEASE_TAG" >/dev/null
          git checkout --force "refs/tags/$RELEASE_TAG"

      - name: Resolve release metadata
        env:
          MANUAL_RELEASE_TAG: ${{ inputs.release_tag }}
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Sources/Wink/Resources/Info.plist)"

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            RELEASE_TAG="${MANUAL_RELEASE_TAG}"
          else
            RELEASE_TAG="${GITHUB_REF_NAME}"
          fi

          case "$RELEASE_TAG" in
            v*) ;;
            *)
              echo "Error: release workflow requires a v* tag, got '$RELEASE_TAG'" >&2
              exit 1
              ;;
          esac

          if [ "v${VERSION}" != "$RELEASE_TAG" ]; then
            echo "Error: tag '$RELEASE_TAG' does not match Info.plist version 'v${VERSION}'" >&2
            exit 1
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "DMG_PATH=build/Wink-${VERSION}.dmg" >> "$GITHUB_ENV"

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_APP_CERT_BASE64: ${{ secrets.DEVELOPER_ID_APP_CERT_BASE64 }}
          DEVELOPER_ID_APP_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_APP_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          printf '%s' "$DEVELOPER_ID_APP_CERT_BASE64" | base64 -D > "$CERT_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$DEVELOPER_ID_APP_CERT_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security default-keychain -d user -s "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"

      - name: Write notarytool API key
        env:
          NOTARYTOOL_KEY: ${{ secrets.NOTARYTOOL_KEY }}
        run: |
          printf '%s' "$NOTARYTOOL_KEY" > "$NOTARY_KEY_PATH"
          chmod 600 "$NOTARY_KEY_PATH"

      - name: Swift version
        run: swift --version

      - name: Test
        run: swift test

      - name: Package signed app bundle
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APP_SIGNING_IDENTITY }}
          ENTITLEMENTS_PLIST: ${{ github.workspace }}/entitlements.plist
          ENABLE_HARDENED_RUNTIME: "1"
          ENABLE_TIMESTAMP: "1"
          REQUIRE_SIGN_IDENTITY: "1"
        run: bash scripts/package-app.sh

      - name: Verify app signature
        run: |
          codesign --verify --deep --strict --verbose=2 build/Wink.app
          spctl --assess --type exec --verbose build/Wink.app

      - name: Package signed DMG
        env:
          DMG_SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APP_SIGNING_IDENTITY }}
        run: bash scripts/package-dmg.sh

      - name: Submit DMG for notarization
        env:
          NOTARYTOOL_KEY_ID: ${{ secrets.NOTARYTOOL_KEY_ID }}
          NOTARYTOOL_ISSUER: ${{ secrets.NOTARYTOOL_ISSUER }}
        run: |
          xcrun notarytool submit "$DMG_PATH" \
            --key "$NOTARY_KEY_PATH" \
            --key-id "$NOTARYTOOL_KEY_ID" \
            --issuer "$NOTARYTOOL_ISSUER" \
            --wait

      - name: Staple notarization ticket
        run: xcrun stapler staple "$DMG_PATH"

      - name: Validate final DMG
        run: |
          xcrun stapler validate "$DMG_PATH"
          spctl --assess --type open --context context:primary-signature --verbose "$DMG_PATH"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$DMG_PATH" --clobber
          else
            gh release create "$RELEASE_TAG" "$DMG_PATH" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi

      - name: Cleanup temporary credentials
        if: always()
        run: |
          rm -f "$CERT_PATH" "$NOTARY_KEY_PATH"
          security delete-keychain "$KEYCHAIN_PATH" || true

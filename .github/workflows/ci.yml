name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-15
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Swift version
        run: swift --version

      - name: Build (debug)
        run: swift build

      - name: Test
        run: swift test

      - name: Build (release)
        run: swift build -c release

      - name: Package app bundle
        run: bash scripts/package-app.sh

      - name: Verify app bundle
        run: |
          test -f build/Quickey.app/Contents/MacOS/Quickey
          test -f build/Quickey.app/Contents/Info.plist
          file build/Quickey.app/Contents/MacOS/Quickey | grep -q "Mach-O"

      - name: Package DMG
        run: bash scripts/package-dmg.sh

      - name: Verify DMG
        run: |
          VERSION="$(/usr/libexec/PlistBuddy -c 'Print :CFBundleShortVersionString' Sources/Quickey/Resources/Info.plist)"
          test -f "build/Quickey-${VERSION}.dmg"

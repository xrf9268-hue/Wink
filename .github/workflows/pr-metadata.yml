name: PR Metadata

on:
  pull_request_target:
    types: [opened, edited, reopened, synchronize, ready_for_review, converted_to_draft]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate PR metadata
    runs-on: ubuntu-latest
    steps:
      - name: Checkout base workflow code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          ref: ${{ github.event.pull_request.base.sha }}

      - name: Validate issue linkage and validation status
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: node .github/scripts/validate-pr-metadata.mjs
